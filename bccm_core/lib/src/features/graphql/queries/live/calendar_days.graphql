query GetCalendarDay($date: Date!) {
  calendar {
    day(day: $date) {
      ...CalendarDay
    }
  }
}

fragment CalendarEntry on CalendarEntry {
  __typename
  id
  title
  description
  start
  end
  buffer {
    url
    availableUntil
  }
  ... on EpisodeCalendarEntry {
    id
    episode {
      __typename
      id
      publishDate
      image(style: default)
      locked
    }
  }
  ... on SimpleCalendarEntry {
    id
  }
}

fragment CalendarDay on CalendarDay {
  events {
    id
    title
    start
    end
    image
  }
  entries {
    ...CalendarEntry
  }
}
