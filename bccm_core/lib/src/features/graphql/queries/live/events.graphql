query GetEvent($id: ID!) {
  event(id: $id) {
    ...CalendarEventWithEntries
  }
}

fragment CalendarEventWithEntries on Event {
  id
  title
  start
  end
  entries {
    ...CalendarEntry
  }
}

query ListEvents($from: Date) {
  calendar {
    events(from: $from) {
      id
      title
    }
  }
}
