fragment PlaylistSong on Song {
  id
  key
  title
  urls
  collection {
    id
    code
  }
  contributors {
    contributionTypes
    person {
      id
      name
    }
  }
}

query GetPlaylist($id: ID!, $first: Int, $cursor: Cursor) {
  playlist(id: $id) {
    id
    title
    description
    image
    items(first: $first, cursor: $cursor) {
      total
      first
      nextCursor
      hasNext
      items {
        __typename
        ... on Episode {
          ...PlayableMediaItem
          copyrightHolder {
            name
          }
          songs {
            ...PlaylistSong
          }
        }
        ... on Short {
          id
          title
          songs {
            ...PlaylistSong
          }
        }
      }
    }
  }
}
