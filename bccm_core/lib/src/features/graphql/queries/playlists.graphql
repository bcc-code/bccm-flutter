fragment PlaylistDetails on Playlist {
  id
  title
  description
  image
}

fragment PlaylistContributor on Contributor {
  contributionTypes
  person {
    id
    name
  }
}

fragment PlaylistSong on Song {
  id
  key
  title
  urls
  collection {
    id
    code
  }
  contributors {
    ...PlaylistContributor
  }
}

query GetPlaylist($id: ID!, $first: Int, $cursor: Cursor) {
  playlist(id: $id) {
    ...PlaylistDetails
    items(first: $first, cursor: $cursor) {
      total
      first
      nextCursor
      hasNext
      items {
        __typename
        ... on Episode {
          id
          title
          description
          duration
          copyrightHolder {
            id
            name
            type
          }
          songs {
            ...PlaylistSong
          }
          contributors {
            ...PlaylistContributor
          }
          ...PlayableMediaItem
        }
        ... on Short {
          id
          title
          songs {
            ...PlaylistSong
          }
        }
      }
    }
  }
}
